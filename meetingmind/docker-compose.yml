version: "3.9"

x-agent-env: &agent-env
  BUTTERBASE_API_KEY: ${BUTTERBASE_API_KEY}
  BUTTERBASE_APP_ID: ${BUTTERBASE_APP_ID}
  BUTTERBASE_API_URL: ${BUTTERBASE_API_URL}
  AGENTFIELD_CONTROL_PLANE_URL: http://agentfield:8080
  EVERMIND_API_KEY: ${EVERMIND_API_KEY}
  EVERMIND_API_URL: ${EVERMIND_API_URL}
  NOSANA_GPU_ENDPOINT: ${NOSANA_GPU_ENDPOINT}
  TOKENROUTER_API_KEY: ${TOKENROUTER_API_KEY}
  TOKENROUTER_API_URL: ${TOKENROUTER_API_URL}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY}
  DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
  SENDGRID_API_KEY: ${SENDGRID_API_KEY}

services:
  # ── AgentField control plane ─────────────────────────────────────────────
  agentfield:
    image: agentfield/control-plane:latest
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  # ── Agents ───────────────────────────────────────────────────────────────
  meeting-bot:
    build:
      context: ./agents/meeting_bot
      dockerfile: Dockerfile
    environment:
      <<: *agent-env
    depends_on:
      - agentfield
    restart: unless-stopped

  mom-agent:
    build:
      context: ./agents/mom_agent
      dockerfile: Dockerfile
    environment:
      <<: *agent-env
    depends_on:
      - agentfield
    restart: unless-stopped

  kpi-agent:
    build:
      context: ./agents/kpi_agent
      dockerfile: Dockerfile
    environment:
      <<: *agent-env
    depends_on:
      - agentfield
    restart: unless-stopped

  graph-agent:
    build:
      context: ./agents/graph_agent
      dockerfile: Dockerfile
    environment:
      <<: *agent-env
    depends_on:
      - agentfield
    restart: unless-stopped

  query-agent:
    build:
      context: ./agents/query_agent
      dockerfile: Dockerfile
    environment:
      <<: *agent-env
    depends_on:
      - agentfield
    restart: unless-stopped

  # ── Dashboard (Next.js) ───────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BUTTERBASE_API_URL: ${BUTTERBASE_API_URL}
      NEXT_PUBLIC_BUTTERBASE_API_KEY: ${BUTTERBASE_API_KEY}
      NEXT_PUBLIC_BUTTERBASE_APP_ID: ${BUTTERBASE_APP_ID}
      NEXT_PUBLIC_DASHBOARD_URL: http://localhost:3000
      AGENTFIELD_CONTROL_PLANE_URL: http://agentfield:8080
    depends_on:
      - agentfield

  # ── Meet Add-on ───────────────────────────────────────────────────────────
  meet-addon:
    build:
      context: ./meet-addon
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_BUTTERBASE_API_URL: ${BUTTERBASE_API_URL}
      NEXT_PUBLIC_BUTTERBASE_API_KEY: ${BUTTERBASE_API_KEY}
      NEXT_PUBLIC_BUTTERBASE_APP_ID: ${BUTTERBASE_APP_ID}
      NEXT_PUBLIC_DASHBOARD_URL: http://localhost:3000

  # ── ML server (local GPU dev only — replace with Nosana in prod) ──────────
  ml-server:
    build:
      context: ./ml_server
      dockerfile: Dockerfile.gpu
    ports:
      - "8000:8000"
    environment:
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - local-gpu  # only starts with: docker compose --profile local-gpu up

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
